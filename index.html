<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vanshu ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Updated background to use bg.png */
            background: #ff7eb3 url('bg.png') no-repeat center center/cover;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Container for falling hearts */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicking through hearts */
            z-index: 1;
        }

        /* Individual falling heart style */
        .heart-fall {
            position: absolute;
            top: -20px;
            color: #ff4757;
            font-size: 1.5rem;
            opacity: 0.8;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(105vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 30px 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 2; /* Keeps card above falling hearts */
        }

        .subtitle {
            font-size: 0.9rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .birthday-wish {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 15px;
            font-style: italic;
            opacity: 0.9;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            line-height: 1.3;
        }

        .proposal-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 18px;
            border: 6px solid #ffb3a7;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            margin: 0 auto 25px auto;
            display: block;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; 
            margin-top: 20px;
            position: relative;
            min-height: 60px;
            width: 100%;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        #yesBtn {
            background-color: #ffffff;
            color: #ff4757;
            position: relative;
            z-index: 5;
        }

        #yesBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
        }

        #noBtn {
            background-color: #ff4757;
            color: #ffffff;
            position: relative;
            transition: all 0.1s ease;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="heartsContainer"></div>

    <div class="card">
        <p class="subtitle">From Your Favourite Person 💝</p>
        <p class="birthday-wish">✨ Happy Birthday, Vanshu! ✨</p>
        <h1>Will you forever be mine and be my girlfriend? 👑</h1>
         
        <img src="cat-rose.jpg" alt="Cute Cat Proposal" class="proposal-img">
         
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">Yes 💖</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No 😢</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function celebrate() {
            window.location.href = 'success.html';
        }

        // Falling Hearts Generator logic
        function createHeart() {
            const container = document.getElementById('heartsContainer');
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            
            // Randomize heart styles
            const heartsArray = ['❤️', '💖', '💝', '💕', '💗'];
            heart.innerText = heartsArray[Math.floor(Math.random() * heartsArray.length)];
            
            // Randomize positions and sizes
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px'; // 10px to 30px
            
            // Randomize fall speed durations (between 3s and 6s)
            const duration = Math.random() * 3 + 3;
            heart.style.animationDuration = duration + 's';
            
            container.appendChild(heart);
            
            // Automatically clean up hearts after they leave the viewport
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Spawn a heart every 300ms
        setInterval(createHeart, 300);
    </script>
</body>
</html>
